<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PyLab — Leaderboard</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="lb-page">

  <nav class="lb-page-nav">
    <h1>🏆 PyLab Leaderboard</h1>
    <div class="lb-live" style="margin-left:12px">
      <div class="live-dot"></div>
      <span style="font-size:0.78rem;color:var(--muted)">Live</span>
    </div>
    <div style="margin-left:auto;display:flex;gap:10px">
      <a href="/game" class="btn btn-ghost btn-sm">← Back to Lab</a>
    </div>
  </nav>

  <div class="lb-page-body">

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <div>
        <h2 style="font-size:1.4rem;font-weight:700">Rankings</h2>
        <p style="color:var(--muted);font-size:0.85rem;margin-top:2px">
          Top scientists ranked by total XP
        </p>
      </div>
      <div id="total-count" style="color:var(--muted);font-size:0.85rem"></div>
    </div>

    <div id="podium" style="display:flex;justify-content:center;gap:16px;margin-bottom:32px"></div>

    <table class="lb-table" id="lb-table">
      <thead>
        <tr>
          <th class="rank-cell">#</th>
          <th>Scientist</th>
          <th>Level</th>
          <th>Challenges</th>
          <th>XP</th>
          <th>Progress</th>
        </tr>
      </thead>
      <tbody id="lb-tbody">
        <tr><td colspan="6" style="text-align:center;color:var(--muted);padding:32px">Loading…</td></tr>
      </tbody>
    </table>

  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const TOTAL_CHALLENGES = 20;
  const myId = JSON.parse(sessionStorage.getItem('pylab_player') || 'null')?.id;

  const TIER_COLORS = {
    'Nucleotide': { bg: '#3fb95020', color: '#3fb950', border: '#3fb95040' },
    'Amino Acid': { bg: '#58a6ff20', color: '#58a6ff', border: '#58a6ff40' },
    'Organelle':  { bg: '#bc8cff20', color: '#bc8cff', border: '#bc8cff40' },
    'Cell':       { bg: '#e3b34120', color: '#e3b341', border: '#e3b34140' },
    'Organism':   { bg: '#f47b2220', color: '#f47b22', border: '#f47b2240' },
    'Ecosystem':  { bg: '#f8514920', color: '#f85149', border: '#f8514940' },
  };

  function tierStyle(name) {
    const t = TIER_COLORS[name] || TIER_COLORS['Nucleotide'];
    return `background:${t.bg};color:${t.color};border:1px solid ${t.border};`;
  }

  function renderPodium(data) {
    const podium = document.getElementById('podium');
    const top3 = data.slice(0, 3);
    const order = [1, 0, 2]; // 2nd, 1st, 3rd visual order
    const heights = ['80px', '110px', '65px'];
    const medals = ['🥈', '🥇', '🥉'];
    const labels = ['2nd', '1st', '3rd'];

    podium.innerHTML = order.map((idx, pos) => {
      const p = top3[idx];
      if (!p) return '';
      return `
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
          <div style="font-size:1.8rem">${p.avatar}</div>
          <div style="font-size:0.85rem;font-weight:600;max-width:80px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.name}</div>
          <div style="font-size:0.75rem;color:#e3b341;font-weight:600">${p.total_xp} XP</div>
          <div style="
            width:80px;
            height:${heights[pos]};
            background:var(--bg2);
            border:1px solid var(--border);
            border-radius:6px 6px 0 0;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:1.6rem;
          ">${medals[pos]}</div>
        </div>
      `;
    }).join('');
  }

  function renderTable(data) {
    document.getElementById('total-count').textContent = `${data.length} scientist${data.length !== 1 ? 's' : ''} in the lab`;

    const tbody = document.getElementById('lb-tbody');
    if (data.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:32px">No one has joined yet!</td></tr>';
      return;
    }

    tbody.innerHTML = data.map(p => {
      const rankClass = p.rank === 1 ? 'rank-gold' : p.rank === 2 ? 'rank-silver' : p.rank === 3 ? 'rank-bronze' : '';
      const isMe = p.id === myId;
      const progressPct = Math.round((p.challenges_completed / TOTAL_CHALLENGES) * 100);
      return `
        <tr ${isMe ? 'class="me"' : ''}>
          <td class="rank-cell ${rankClass}">${p.rank}</td>
          <td>
            <div class="player-cell">
              <span style="font-size:1.2rem">${p.avatar}</span>
              <span style="font-weight:500">${escHtml(p.name)}${isMe ? ' <span style="color:var(--green);font-size:0.72rem">(you)</span>' : ''}</span>
            </div>
          </td>
          <td>
            <span class="level-pill" style="${tierStyle(p.levelInfo.name)};padding:2px 10px;border-radius:12px;font-size:0.72rem;font-weight:600">
              ${p.levelInfo.name}
            </span>
          </td>
          <td style="color:var(--muted)">${p.challenges_completed} / ${TOTAL_CHALLENGES}</td>
          <td style="font-weight:700;color:#e3b341">${p.total_xp}</td>
          <td>
            <div style="display:flex;align-items:center;gap:8px">
              <div class="mini-bar-wrap">
                <div class="mini-bar-fill" style="width:${progressPct}%"></div>
              </div>
              <span style="font-size:0.75rem;color:var(--muted)">${progressPct}%</span>
            </div>
          </td>
        </tr>
      `;
    }).join('');
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function load() {
    const data = await fetch('/api/leaderboard').then(r => r.json());
    renderPodium(data);
    renderTable(data);
  }

  load();

  // Live updates
  const socket = io();
  socket.on('leaderboard_update', data => {
    renderPodium(data);
    renderTable(data);
  });
</script>
</body>
</html>
